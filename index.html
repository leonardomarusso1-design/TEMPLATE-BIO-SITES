<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borracharia Claudney</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        
        <div class="header">
            <img src="assets/logo.png" alt="Borracharia Claudney" class="logo">
            
            <div class="title-section">
                <div class="wings">
                    <div class="wing left">
                        <div class="stripe yellow"></div>
                        <div class="stripe orange"></div>
                        <div class="stripe red"></div>
                    </div>
                    <div class="titles">
                        <h2>BORRACHARIA</h2>
                        <h1>CLAUDNEY</h1>
                    </div>
                    <div class="wing right">
                        <div class="stripe red"></div>
                        <div class="stripe orange"></div>
                        <div class="stripe yellow"></div>
                    </div>
                </div>
                
                <div class="tagline">
                    <div class="line left"></div>
                    <span>Pneus, reparos e atendimento rápido</span>
                    <div class="line right"></div>
                </div>
            </div>
        </div>
        
        <div class="buttons">
            <a href="#" class="button whatsapp">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.812 11.812 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                    </svg>
                </div>
                <div class="text">
                    <span class="title">CHAMAR NO WHATSAPP</span>
                    <span class="subtitle">Fale direto com a borracharia</span>
                </div>
                <span class="arrow">></span>
            </a>
            
            <a href="#" class="button instagram">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                    </svg>
                </div>
                <div class="text">
                    <span class="title">NOSSO INSTAGRAM</span>
                    <span class="subtitle">Acompanhe novidades e serviços</span>
                </div>
                <span class="arrow">></span>
            </a>
            
            <a href="#" class="button google">
                <div class="icon-box">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/>
                    </svg>
                </div>
                <div class="text">
                    <span class="title">AVALIAR NO GOOGLE</span>
                    <span class="subtitle">Deixe sua avaliação</span>
                </div>
                <span class="arrow">></span>
            </a>
        </div>
        
        <div class="cards">
            <div class="card">
                <div class="card-icon yellow">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M11 21h2v-2h-2v2zm0-10h2V3h-2v8zm-6 6h2v-2H5v2zm12 0h2v-2h-2v2zm-9 4h2v-2H8v2zm8 0h2v-2h-2v2zm-4 4h2v-2h-2v2z"/>
                    </svg>
                </div>
                <div class="card-text">
                    <span>ATENDIMENTO</span>
                    <span class="highlight yellow">RÁPIDO</span>
                </div>
            </div>
            
            <div class="card">
                <div class="card-icon orange">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                    </svg>
                </div>
                <div class="card-text">
                    <span>CONFIANÇA</span>
                    <span class="highlight orange">NA ESTRADA</span>
                </div>
            </div>
            
            <div class="card">
                <div class="card-icon red">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                    </svg>
                </div>
                <div class="card-text">
                    <span>DESDE</span>
                    <span class="highlight red">1992</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>ATENDIMENTO <span class="yellow">RÁPIDO</span> E <span class="orange">CONFIANÇA</span> NA ESTRADA</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
